# User-Added Companies
# Add your custom companies here

companies:
  - id: "dune-security"
    name: "Dune Security"
    career_url: "https://www.dune.security/careers"
    ats_type: "custom"
    ats_config:
      base_url: "https://www.dune.security/careers"
      job_list_selector: ".job, .position, .career-item"
      title_selector: "h2, h3, .job-title"
      url_selector: "a"
    search_keywords: ["security", "data", "ml", "ai"]
    enabled: true
    priority: 2

  - id: "yahoo"
    name: "Yahoo"
    career_url: "https://ouryahoo.wd5.myworkdayjobs.com/en-US/careers"
