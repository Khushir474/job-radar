# Fly.io configuration for Job Radar
app = 'job-radar-ambergris-moonbeam-7035'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile'

# Job Radar is a scheduled cron job, not an HTTP service
# We use Fly Machines to run the job on a schedule

[[services]]
  internal_port = 8080
  processes = ['app']

  [services.http_service]
    disabled = true

# Schedule the check job every 2 hours
[[crons]]
  schedule = "0 */2 * * *"
  command = "python -m job_radar.cli check"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
